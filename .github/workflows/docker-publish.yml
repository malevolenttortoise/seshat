name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Tag pushes + branch pushes for the SAME commit fire two
# workflow runs (branch=main + tag=vX.Y.Z) and historically raced
# each other for GHCR push credentials / checkout token state.
# Whichever lost the race failed noisily even though the winner
# published the image correctly. Serialize them by SHA so the
# second run queues behind the first — both still publish (their
# metadata-action invocations emit different tags based on
# github.ref) but they don't step on each other.
concurrency:
  group: docker-publish-${{ github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Two image variants per commit:
    #   - full:  ghcr.io/<repo>:latest         (Calibre bundled, ~860MB)
    #   - slim:  ghcr.io/<repo>:latest-slim    (no Calibre,      ~225MB)
    # Suffix + onlatest makes metadata-action emit `latest-slim` /
    # `<version>-slim` for the slim row alongside the bare tags for full.
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            suffix: ""
          - dockerfile: Dockerfile.slim
            suffix: "-slim"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          # `type=semver` requires strict SemVer 2.0.0 (three numeric
          # segments) and emits no tag when the ref doesn't match —
          # which silently broke the tag-push build on v2.3.4.1/2/3/4
          # (four segments by our loose-SemVer-within-an-arc policy;
          # see feedback_seshat_semver_policy.md). Switching to
          # `type=match` lets us extract the version verbatim,
          # supporting both 3-segment (v2.3.5) and 4-segment
          # (v2.3.4.4) tags. The two patterns emit `<full>` and
          # `<major>.<minor>` so you still get `2.3.4.4` AND `2.3`
          # tags pointing at the same image.
          tags: |
            type=ref,event=branch
            type=match,pattern=v(\d+\.\d+\.\d+(?:\.\d+)?),group=1
            type=match,pattern=v(\d+\.\d+),group=1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake the commit SHA into /app/VERSION so the Settings
          # page can show "Build: <short-sha>" and users can verify
          # they're running the version they think they are.
          build-args: |
            GIT_SHA=${{ github.sha }}
