<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1a2e"/>
      <stop offset="100%" style="stop-color:#12101c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#c8982a"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a6abf"/>
      <stop offset="100%" style="stop-color:#3d4a8a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.6"/>

  <!-- Seven-pointed star (Seshat's emblem) -->
  <g transform="translate(256,130)" fill="url(#gold)">
    <polygon points="0,-52 8,-16 44,-28 20,2 48,28 12,22 0,58 -12,22 -48,28 -20,2 -44,-28 -8,-16" opacity="0.9"/>
    <circle cx="0" cy="0" r="10" fill="#1e1a2e"/>
  </g>

  <!-- Vertical staff (notched palm branch — stylized) -->
  <line x1="256" y1="178" x2="256" y2="430" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <!-- Staff notches (tally marks) -->
  <line x1="250" y1="210" x2="262" y2="205" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="235" x2="262" y2="230" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="260" x2="262" y2="255" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="285" x2="262" y2="280" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="310" x2="262" y2="305" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>

  <!-- Open book at the base of the staff -->
  <!-- Left page -->
  <path d="M160 340 L248 355 L248 420 L160 405 Z" fill="#2a2540" stroke="url(#indigo)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right page -->
  <path d="M352 340 L264 355 L264 420 L352 405 Z" fill="#2a2540" stroke="url(#indigo)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Book spine highlight -->
  <line x1="256" y1="352" x2="256" y2="423" stroke="url(#indigo)" stroke-width="3"/>

  <!-- Page lines (left) -->
  <line x1="178" y1="362" x2="238" y2="370" stroke="#4a4570" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="178" y1="376" x2="238" y2="384" stroke="#4a4570" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="178" y1="390" x2="220" y2="396" stroke="#4a4570" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Page lines (right) -->
  <line x1="334" y1="362" x2="274" y2="370" stroke="#4a4570" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="334" y1="376" x2="274" y2="384" stroke="#4a4570" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="334" y1="390" x2="292" y2="396" stroke="#4a4570" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Arch / crescent behind the star (leopard skin headband abstracted) -->
  <path d="M200 150 Q256 95 312 150" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
